<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Markah Peperiksaan Mac 2026 - SMK Selirik</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --night-blue: #151B54;
            /* Latar belakang Biru Muda Lembut (Gradient) */
            --soft-blue-gradient: linear-gradient(135deg, #E0F7FA 0%, #90CAF9 100%);
            --corporate-pattern: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--soft-blue-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Style */
        header {
            width: 100%;
            background-color: var(--night-blue);
            background-image: var(--corporate-pattern);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 4px solid #ffd700;
        }

        header img {
            width: 80px;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        header p {
            margin: 5px 0 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Container */
        .container {
            width: 95%;
            max-width: 1300px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Login Box */
        #login-section {
            max-width: 400px;
            margin: 30px auto;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        button {
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .btn-primary { background: var(--night-blue); width: 100%; padding: 12px; font-size: 1rem;}
        .btn-success { background: #2e7d32; }
        .btn-danger { background: #c62828; }
        .btn-print { background: #d35400; } /* Warna Oren untuk butang cetak */

        /* Dashboard Section */
        #dashboard-section {
            display: none;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #placeholder-msg {
            text-align: center;
            padding: 50px 20px;
            color: var(--night-blue);
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #bbdefb;
            margin-top: 20px;
        }

        .table-wrapper {
            overflow-x: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        th {
            background-color: var(--night-blue);
            color: white;
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
            white-space: nowrap;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .ulasan-select {
            width: 100%;
            min-width: 180px;
            padding: 5px;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            width: 100%;
        }

        /* Tetapan Khas Semasa Print Jadual (Ctrl+P) */
        @media print {
            body { background: white; }
            header, .filter-bar, footer, button, #placeholder-msg { display: none !important; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; margin: 0; }
            .table-wrapper { overflow-x: visible; }
            table { font-size: 8pt; }
            th { background-color: #eee !important; color: black !important; }
            @page { size: landscape; }
        }

        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .action-buttons { justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/fYyZdyLz/Logo-Selirik.png" alt="Logo SMK Selirik">
    <h1>SMK SELIRIK, KAPIT</h1>
    <p>Tahun 2026</p>
</header>

<div class="container">
    <div id="login-section">
        <h2 style="color: var(--night-blue)">Log Masuk Guru Tingkatan</h2>
        <div class="input-group">
            <label>Tingkatan</label>
            <select id="select-tingkatan">
                <option value="1">Tingkatan 1</option>
                <option value="2">Tingkatan 2</option>
                <option value="3">Tingkatan 3</option>
                <option value="4">Tingkatan 4</option>
                <option value="5">Tingkatan 5</option>
            </select>
        </div>
        <div class="input-group">
            <label>ID Pengguna</label>
            <input type="text" id="user-id" placeholder="Masukkan ID">
        </div>
        <div class="input-group">
            <label>Kata Laluan</label>
            <input type="password" id="user-pass" placeholder="Masukkan Kata Laluan">
        </div>
        <button class="btn-primary" onclick="login()">Masuk Ke Dashboard</button>
        <p id="error-msg" style="color: red; font-size: 0.8rem; display: none; margin-top: 10px;">ID atau Kata Laluan Salah!</p>
    </div>

    <div id="dashboard-section">
        <div class="filter-bar">
            <div>
                <label style="font-weight: 600; color: var(--night-blue);">Pilih Kelas Anda: </label><br>
                <select id="select-kelas" onchange="filterData()" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: 'Poppins'; margin-top: 5px; min-width: 200px;"></select>
            </div>
            
            <div class="action-buttons" id="action-buttons" style="display: none;">
                <button class="btn-print" onclick="cetakJadual()">📄 Cetak Jadual</button>
                <button class="btn-print" onclick="cetakSlip()">🖨️ Cetak Slip Pelajar</button>
                <button class="btn-print" onclick="eksportExcel()" style="background: #27ae60;">📊 Eksport Excel</button>
                
                <button class="btn-success" onclick="saveUlasan()">💾 Simpan Ulasan</button>
                <button class="btn-danger" onclick="logout()">🚪 Keluar</button>
            </div>
        </div>

        <h3 id="display-title" style="text-align: center; color: var(--night-blue); margin-top: 5px;"></h3>

        <div id="placeholder-msg">
            <h2 style="margin-bottom: 10px;">Selamat Datang!</h2>
            <p>Sila pilih nama kelas anda pada menu di atas untuk memaparkan senarai nama pelajar.</p>
        </div>

        <div class="table-wrapper" id="table-container">
            <table id="markah-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    hakcipta NDJE@Selirik, Kapit 2026
</footer>

<script>
    const CONFIG = {
        links: {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9ngcL37KMX8ZDsGKomo7Lv6yowNqFdcWciJuvS1UkUU6aFHI_VKuFDLP1d0fKtMlXTW8APMYD38xZ/pub?gid=1419213935&single=true&output=csv",
            2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6QwXil_0_gA0OBb2t82FneuCt68Sp7P9-He4zyBPEoaVHkJent8hiCSFPa33F-AEmR9BgeEogpt-/pub?gid=1419213935&single=true&output=csv",
            3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg40cTCNS7MVyZVA3-8sZkbNtVT_Db9abxz6xhv1ccZ5ZksWIy0qyn8y30lqxG9G9YN1TOMBXF7WCY/pub?gid=1419213935&single=true&output=csv",
            4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR831uDWcPfxf9zOj-mekolv_DMkdsYRMdVsxoLcKqwL88z-tetvP57ti5wB5M2dYIXYVZf9eX7R6Q8/pub?gid=1615224868&single=true&output=csv",
            5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq9lzeK5sombRvA2WRgEYGygUdZwEfifZHVy4IMZiRD7c-yll60qkA4pXeBBocqJsRV6GpM1uazU_B/pub?gid=1615224868&single=true&output=csv"
        },
        scripts: {
            1: "https://script.google.com/macros/s/AKfycbzI4uyIyKd5O0do0KQRbdjuzay3OMUBpN0EuJCOtbcAI4dAmh0Fj_n_CTsCX9mwdeNsEg/exec",
            2: "https://script.google.com/macros/s/AKfycbw0BakCGDqNheCPyzdqrstH8jM0Je3D1fM2oJTB0odH5UIAO08GNdOSIqWMK6e1ZQmL/exec",
            3: "https://script.google.com/macros/s/AKfycbwGVcnpPo2ASHnvXyvfCB2PQSYi9XtITDEF6YGC7G0idbXmw13TixmF02846I2593dH/exec",
            4: "https://script.google.com/macros/s/AKfycbztn63Bhbjl6EKwvVFadcYNY3jzA0Nuty-_veEYQBkLenytXxQWZY5h7GweO3maDLn0/exec",
            5: "https://script.google.com/macros/s/AKfycbxg5tGuWQ6U8Aou1tG-m5PXWEyfbfcq_maaL_W8awU35NiBf3v-7c8peqQMeBCIqIdUsQ/exec"
        }
    };

    const ULASAN_LIST = [
        "Teruskan berusaha untuk kejayaan lebih cemerlang untuk masa depan yang gemilang",
        "Sekalung tahniah atas kejayaan anda. Teruskan Usaha dengan lebih gigih untuk kejayaan lebih baik.",
        "Prestasi anda memberangsangkan. Usaha lagi untuk kejayaan yang lebih cemerlang",
        "Anda mampu mencapai lebih kecemerlangan dengan bersikap proaktif di dalam kelas.",
        "Keputusan semasa menunjukkan anda masih belum menemui cara belajar yang betul",
        "Keputusan masih ditahap sederhana. Ia memerlukan komitmen daripada anda",
        "Anda harus berusaha dengan lebih gigih. Jangan berlengah lagi",
        "Beberapa mata pelajaran masih belum mencapai tahap yang sepatutnya.",
        "Berikan lebih tumpuan kepada matapelajaran tertentu.",
        "Tingkatkan usaha anda untuk kejayaan yang lebih baik daripada hari ini.",
        "Usaha anda telah menunjukkan hasil yang agak baik. Gandakan usaha anda.",
        "Pencapaian memuaskan. Teruskan usaha anda. Anda pasti berjaya.",
        "Pencapaian masih lemah. Tingkatkan usaha dan ubah sikap demi masa depan anda.",
        "Hargailah masa dan buangkan sikap kerap ponteng kelas."
    ];

    let currentData = [];
    let currentTingkatan = "";
    let filteredStudents = [];
    let activeSubjects = []; // Simpan subjek yang wujud untuk kelas dipilih

    function login() {
        const id = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        const ting = document.getElementById('select-tingkatan').value;

        if (id === "GT2026" && pass === "GT2026") {
            currentTingkatan = ting;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            fetchData();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function fetchData() {
        document.getElementById('placeholder-msg').innerHTML = "<h2 style='margin-bottom: 10px;'>Sila Tunggu...</h2><p>Sedang memuat turun data dari pangkalan data sekolah.</p>";
        
        const url = CONFIG.links[currentTingkatan];
        Papa.parse(url, {
            download: true,
            header: false,
            complete: function(results) {
                currentData = results.data;
                document.getElementById('placeholder-msg').innerHTML = "<h2 style='margin-bottom: 10px;'>Selamat Datang!</h2><p>Sila pilih nama kelas anda pada menu di atas untuk memaparkan senarai nama pelajar.</p>";
                populateKelas(results.data);
            }
        });
    }

    function populateKelas(data) {
        const selectKelas = document.getElementById('select-kelas');
        const kelasSet = new Set();
        
        for(let i = 1; i < data.length; i++) {
            if(data[i][3] && data[i][3] !== "NULL") kelasSet.add(data[i][3]);
        }

        selectKelas.innerHTML = '<option value="">-- Sila Pilih Kelas --</option>';
        kelasSet.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.textContent = k;
            selectKelas.appendChild(opt);
        });

        filterData();
    }

    function filterData() {
        const selectedKelas = document.getElementById('select-kelas').value;
        const tableContainer = document.getElementById('table-container');
        const placeholderMsg = document.getElementById('placeholder-msg');
        const displayTitle = document.getElementById('display-title');
        const actionBtns = document.getElementById('action-buttons');
        
        if (!selectedKelas) {
            tableContainer.style.display = 'none';
            actionBtns.style.display = 'none';
            placeholderMsg.style.display = 'block';
            displayTitle.textContent = "";
            return;
        }

        tableContainer.style.display = 'block';
        actionBtns.style.display = 'flex';
        placeholderMsg.style.display = 'none';
        displayTitle.textContent = `Dashboard Markah Peperiksaan Mac 2026 - Kelas ${selectedKelas}`;

        const ting = parseInt(currentTingkatan);
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        
        // 1. Dapatkan data khusus untuk kelas ini sahaja
        filteredStudents = currentData.filter(row => row[3] === selectedKelas);

        // 2. Senarai semua subjek berpotensi
        let allSubjekIdx = [];
        if (ting >= 4) {
            allSubjekIdx = [
                {n: "BM", m: 4, g: 5}, {n: "SEJ", m: 6, g: 7}, {n: "ENG", m: 8, g: 9},
                {n: "MAT", m: 10, g: 11}, {n: "PM", m: 12, g: 13}, {n: "PI", m: 14, g: 15},
                {n: "SN", m: 16, g: 17}, {n: "PSV", m: 18, g: 19}, {n: "IBAN", m: 20, g: 21},
                {n: "RC", m: 22, g: 23}, {n: "PP", m: 24, g: 25}, {n: "PHY", m: 26, g: 27},
                {n: "CHE", m: 28, g: 29}, {n: "BIO", m: 30, g: 31}, {n: "AMAT", m: 32, g: 33},
                {n: "SK", m: 34, g: 35}, {n: "KAG", m: 36, g: 37}, {n: "PJPK", m: 62, g: 63}
            ];
        } else {
            allSubjekIdx = [
                {n: "BM", m: 4, g: 5}, {n: "ENG", m: 6, g: 7}, {n: "MAT", m: 8, g: 9},
                {n: "SEJ", m: 10, g: 11}, {n: "SN", m: 12, g: 13}, {n: "GEO", m: 14, g: 15},
                {n: "IBAN", m: 16, g: 17}, {n: "PM", m: 18, g: 19}, {n: "PI", m: 20, g: 21},
                {n: "RBT", m: 22, g: 23}, {n: "ASK", m: 24, g: 25}, {n: "PSV", m: 26, g: 27},
                {n: "PJPK", m: 40, g: 41}
            ];
        }

        // 3. Tapis subjek: Hanya simpan subjek yang mana sekurang-kurangnya 1 pelajar dalam kelas ada markah
        activeSubjects = allSubjekIdx.filter(s => {
            return filteredStudents.some(row => {
                let mark = row[s.m];
                return (mark && mark !== 'NULL' && mark.trim() !== '');
            });
        });

        // 4. Bina Header
        let headers = ["Bil", "Nama Pelajar"];
        headers.push(...activeSubjects.map(s => s.n));
        
        if (ting >= 4) {
            headers.push("JUM", "PURATA", "GP", "PNG", "KDK", "KDT", "Ulasan");
        } else {
            headers.push("JUM", "PURATA", "GP", "KDK", "KDT", "Ulasan");
        }
        head.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

        // 5. Bina Body
        body.innerHTML = "";
        let bil = 1;
        filteredStudents.forEach(row => {
            let htmlRow = `<td>${bil++}</td><td style="text-align:left; min-width:180px;">${row[2]}</td>`;
            
            // Masukkan markah hanya untuk activeSubjects
            activeSubjects.forEach(s => {
                let mark = row[s.m];
                let gred = row[s.g];
                if (!mark || mark === 'NULL' || mark.trim() === '') {
                    htmlRow += `<td>-</td>`;
                } else {
                    htmlRow += `<td>${mark}<br><strong>${gred}</strong></td>`;
                }
            });

            // Rumusan
            if (ting >= 4) {
                htmlRow += `<td>${row[78] || '-'}</td><td>${row[79] || '-'}</td><td>${row[80] || '-'}</td><td>${row[81] || '-'}</td><td>${row[83] || '-'}</td><td>${row[101] || '-'}</td>`;
            } else {
                htmlRow += `<td>${row[54] || '-'}</td><td>${row[55] || '-'}</td><td>${row[56] || '-'}</td><td>${row[58] || '-'}</td><td>${row[69] || '-'}</td>`;
            }

            // Dropdown Ulasan
            const savedUlasan = localStorage.getItem(`ulasan_${row[2]}`) || "";
            htmlRow += `<td>
                <select class="ulasan-select" data-name="${row[2]}">
                    <option value="">-- Pilih Ulasan --</option>
                    ${ULASAN_LIST.map(u => `<option value="${u}" ${savedUlasan === u ? 'selected' : ''}>${u}</option>`).join('')}
                </select>
            </td>`;

            body.innerHTML += `<tr>${htmlRow}</tr>`;
        });
    }

    // FUNGSI 1: Cetak Jadual Kertas (Print Table)
    function cetakJadual() {
        window.print();
    }

    // FUNGSI 2: Eksport Excel (CSV Format)
    function eksportExcel() {
        let table = document.getElementById("markah-table");
        let rows = table.querySelectorAll("tr");
        let csvContent = "";

        rows.forEach(row => {
            let rowData = [];
            let cols = row.querySelectorAll("td, th");
            cols.forEach(col => {
                // Buang elemen select box jika ada, ambil value ulasan dari localStorage
                if(col.querySelector('select')) {
                    let sel = col.querySelector('select');
                    rowData.push('"' + sel.value + '"');
                } else {
                    // Gantikan breakline dengan ruang kosong untuk Excel
                    let text = col.innerText.replace(/\n/g, ' ');
                    rowData.push('"' + text + '"');
                }
            });
            csvContent += rowData.join(",") + "\n";
        });

        let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        let url = URL.createObjectURL(blob);
        let className = document.getElementById('select-kelas').value;
        link.setAttribute("href", url);
        link.setAttribute("download", `Markah_${className}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // FUNGSI 3: Cetak Slip Keputusan Pelajar
    function cetakSlip() {
        const className = document.getElementById('select-kelas').value;
        const ting = parseInt(currentTingkatan);
        let slipHTML = `
            <html>
            <head>
                <title>Slip Keputusan - ${className}</title>
                <style>
                    body { font-family: Arial, sans-serif; }
                    .slip-container { width: 100%; max-width: 800px; margin: 0 auto; page-break-after: always; padding: 40px 20px; }
                    .header { text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px; }
                    .header h2 { margin: 5px 0; }
                    .student-info { margin-bottom: 20px; width: 100%; }
                    .student-info td { padding: 5px; font-weight: bold; }
                    table.marks { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                    table.marks th, table.marks td { border: 1px solid #000; padding: 8px; text-align: center; }
                    table.marks th { background-color: #f2f2f2; }
                    .ulasan-box { border: 1px dashed #000; padding: 15px; margin-top: 20px; }
                    @media print { body { -webkit-print-color-adjust: exact; } }
                </style>
            </head>
            <body>
        `;

        filteredStudents.forEach(row => {
            let nama = row[2];
            let jum = ting >= 4 ? row[78] : row[54];
            let purata = ting >= 4 ? row[79] : row[55];
            let gp = ting >= 4 ? row[80] : row[56];
            let kdk = ting >= 4 ? row[83] : row[58];
            let kdt = ting >= 4 ? row[101] : row[69];
            let savedUlasan = localStorage.getItem(`ulasan_${nama}`) || "Tiada ulasan.";

            slipHTML += `
                <div class="slip-container">
                    <div class="header">
                        <h2>SMK SELIRIK, KAPIT</h2>
                        <h3>SLIP KEPUTUSAN PEPERIKSAAN MAC 2026</h3>
                    </div>
                    <table class="student-info">
                        <tr><td width="15%">NAMA</td><td width="3%">:</td><td>${nama}</td></tr>
                        <tr><td>KELAS</td><td>:</td><td>${className}</td></tr>
                    </table>
                    
                    <table class="marks">
                        <tr>
                            <th>MATA PELAJARAN</th>
                            <th>MARKAH</th>
                            <th>GRED</th>
                        </tr>
            `;

            activeSubjects.forEach(s => {
                let mark = row[s.m];
                let gred = row[s.g];
                if (mark && mark !== 'NULL' && mark.trim() !== '') {
                    // Dapatkan nama penuh subjek atau biarkan singkatan
                    slipHTML += `<tr><td style="text-align:left;">${s.n}</td><td>${mark}</td><td>${gred}</td></tr>`;
                }
            });

            slipHTML += `
                    </table>
                    
                    <table style="width: 100%; font-weight: bold; margin-bottom: 10px;">
                        <tr>
                            <td>JUMLAH MARKAH: ${jum || '-'}</td>
                            <td>PURATA: ${purata || '-'}</td>
                            <td>GRED PURATA: ${gp || '-'}</td>
                        </tr>
                        <tr>
                            <td>KDK: ${kdk || '-'}</td>
                            <td>KDT: ${kdt || '-'}</td>
                            <td></td>
                        </tr>
                    </table>
                    
                    <div class="ulasan-box">
                        <strong>Ulasan Guru Tingkatan:</strong><br><br>
                        ${savedUlasan}
                    </div>
                </div>
            `;
        });

        slipHTML += `</body></html>`;
        
        let printWindow = window.open('', '_blank');
        printWindow.document.write(slipHTML);
        printWindow.document.close();
        
        // Beri masa sikit untuk browser render sebelum panggil print
        setTimeout(() => {
            printWindow.print();
        }, 500);
    }

    function saveUlasan() {
        const selects = document.querySelectorAll('.ulasan-select');
        const scriptUrl = CONFIG.scripts[currentTingkatan];
        
        selects.forEach(sel => {
            const name = sel.getAttribute('data-name');
            const val = sel.value;
            if(val) {
                localStorage.setItem(`ulasan_${name}`, val);
                fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({nama: name, ulasan: val})
                });
            }
        });
        alert("Tahniah! Ulasan telah berjaya disimpan secara tempatan dan dihantar ke pangkalan data.");
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
